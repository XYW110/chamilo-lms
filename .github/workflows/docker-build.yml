name: Build & Push Chamilo Docker Image
on:
  workflow_dispatch:
  push:
    branches: [master]
jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - name: Login
        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin
      - name: Build image
        run: IMG=ghcr.io/$(echo "${{ github.repository }}" | tr '[:upper:]' '[:lower:]') && docker build -t $IMG:latest .
      - name: Push latest
        run: IMG=ghcr.io/$(echo "${{ github.repository }}" | tr '[:upper:]' '[:lower:]') && docker push $IMG:latest
      - name: Push v2.0.3
        run: IMG=ghcr.io/$(echo "${{ github.repository }}" | tr '[:upper:]' '[:lower:]') && docker tag $IMG:latest $IMG:v2.0.3 && docker push $IMG:v2.0.3
