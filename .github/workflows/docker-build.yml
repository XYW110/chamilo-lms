name: Build & Push Chamilo Docker Image
on:
  workflow_dispatch:
  push:
    branches: [master]
jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - name: Login (PAT with write_packages)
        run: echo "${{ secrets.GH_TOKEN }}" | docker login ghcr.io -u XYW110 --password-stdin
      - name: Build & push
        run: |
          REPO=$(echo "${{ github.repository }}" | tr '[:upper:]' '[:lower:]')
          IMG=ghcr.io/$REPO
          docker build -t $IMG:latest .
          docker push $IMG:latest
          docker tag $IMG:latest $IMG:v2.0.3
          docker push $IMG:v2.0.3
