name: Build & Push Chamilo Docker Image
on:
  workflow_dispatch:
  push:
    branches: [master]
env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}
jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout Chamilo v2.0.3
        uses: actions/checkout@v4
        with:
          repository: chamilo/chamilo-lms
          ref: v2.0.3
      - name: Inject Dockerfile + pre-built frontend
        run: |
          curl -sL -H "Authorization: token *** secrets.GH_TOKEN }}"             "https://raw.githubusercontent.com/XYW110/chamilo-lms/master/Dockerfile" -o Dockerfile
          curl -sL -H "Authorization: token *** secrets.GH_TOKEN }}"             "https://api.github.com/repos/XYW110/chamilo-lms/contents/public/build"             -o /tmp/build_list.json
          mkdir -p public/build
          for item in $(python3 -c "import json,sys; [print(i['name']) for i in json.load(sys.stdin) if i['type']=='file']" < /tmp/build_list.json); do
            curl -sL -H "Authorization: token *** secrets.GH_TOKEN }}"               "https://raw.githubusercontent.com/XYW110/chamilo-lms/master/public/build/$item"               -o "public/build/$item"
          done
      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GH_TOKEN }}
      - uses: docker/metadata-action@v5
        id: meta
        with:
          images: ${{ env.REGISTRY }}/${{ github.repository }}
          tags: |
            type=raw,value=latest
            type=raw,value=v2.0.3
            type=sha,format=short
      - uses: docker/setup-buildx-action@v3
      - uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
